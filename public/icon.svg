<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- safe area: maskable PWA precisa de ~10% de margem em todos os lados -->
  <rect width="512" height="512" rx="96" fill="#FFFDF7"/>

  <!-- caderno espiral, paleta da Trilha -->
  <g transform="translate(120, 96)">
    <rect x="0" y="0" width="272" height="320" rx="14" fill="#FFFDF7" stroke="#2B2A28" stroke-width="10"/>

    <!-- espirais no topo -->
    <g fill="#2B2A28">
      <circle cx="44"  cy="0" r="10"/>
      <circle cx="100" cy="0" r="10"/>
      <circle cx="156" cy="0" r="10"/>
      <circle cx="212" cy="0" r="10"/>
    </g>

    <!-- linhas escritas -->
    <line x1="32" y1="100" x2="240" y2="100" stroke="#9C9385" stroke-width="6" stroke-linecap="round"/>
    <line x1="32" y1="148" x2="216" y2="148" stroke="#9C9385" stroke-width="6" stroke-linecap="round"/>
    <line x1="32" y1="196" x2="200" y2="196" stroke="#9C9385" stroke-width="6" stroke-linecap="round"/>

    <!-- check sparkle: trilha cumprida -->
    <circle cx="56"  cy="252" r="20" fill="#F4D58D" stroke="#2B2A28" stroke-width="6"/>
    <path d="M 44 252 L 52 262 L 70 244" stroke="#2B2A28" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- traço azul de destaque (referência da WavyUnderline da Trilha) -->
    <path d="M 96 264 Q 128 256 160 264 T 224 264" stroke="#4F7CAC" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>
</svg>
